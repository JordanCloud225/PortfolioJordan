<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/PortfolioJordan/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <title>my-portfolio</title>
    <script type="module" crossorigin src="/PortfolioJordan/assets/index-BaJJAkar.js"></script>
    <link rel="stylesheet" crossorigin href="/PortfolioJordan/assets/index-Koi9d2NI.css">
  </head>
  <body>
    <div id="app"></div>

    <script>
      const theme = localStorage.getItem('theme');
      if (!theme) {
        //if no theme is set, default to dark mode
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme','dark')
      } else if (theme === 'dark'){
        document.documentElement.classList.add('dark')
      }else if (theme === 'light'){
        document.documentElement.classList.remove('dark')
      }
    </script>
  </body>
</html>
